name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      BENCHMARKS_DIR: ${{ github.workspace }}
      FRAMEWORK_DIR: ${{ github.workspace }}/burger-api
    steps:
      - name: Checkout benchmarks
        uses: actions/checkout@v4

      # The benchmarks depend on the local framework working copy (linked via
      # `bun link`). Check out the framework repo inside the workspace so the
      # link resolves. The framework's Phase 3 validation APIs live on the
      # `feat/burger-api-v1` branch; override the repo variable BURGER_API_REF
      # if they move to a different branch/tag.
      - name: Checkout framework (burger-api)
        uses: actions/checkout@v4
        with:
          repository: isfhan/burger-api
          ref: ${{ vars.BURGER_API_REF || 'feat/burger-api-v1' }}
          path: burger-api

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Bombardier (benchmark engine)
        run: |
          BOMB_VERSION="1.2.5"
          # codesenberg/bombardier ships per-OS binaries (no archive). Follow
          # the redirect (-L) and place the binary on PATH.
          curl -sSL -o bombardier \
            "https://github.com/codesenberg/bombardier/releases/download/v${BOMB_VERSION}/bombardier-linux-amd64"
          chmod +x bombardier
          sudo mv bombardier /usr/local/bin/bombardier
          bombardier --version

      # Build + register the framework so `bun link burger-api` resolves the
      # local working copy in the benchmarks repo.
      - name: Build framework + register link
        run: |
          cd "$FRAMEWORK_DIR"
          bun install
          bun run --filter burger-api build
          cd packages/burger-api
          bun link

      - name: Install benchmark dependencies (links local burger-api)
        run: |
          cd "$BENCHMARKS_DIR"
          bun link burger-api
          bun install
          # Sanity check: the linked framework must expose the Phase 3 APIs
          # this suite exercises. Fail fast with a clear message if the linked
          # copy is stale (e.g. framework not pushed with Phase 3 changes).
          node -e "
            const fs = require('fs');
            const link = require('path').resolve('node_modules/burger-api');
            const real = fs.realpathSync(link);
            const src = fs.readFileSync(require('path').join(real, 'src/index.ts'), 'utf8');
            if (!src.includes('getServer')) {
              console.error('Linked burger-api at ' + real + ' is missing getServer(); ensure the framework Phase 3 changes are pushed.');
              process.exit(1);
            }
            console.log('linked burger-api exposes getServer(): OK (' + real + ')');
          "

      - name: Typecheck
        run: bun run typecheck
        working-directory: ${{ env.BENCHMARKS_DIR }}

      - name: Core benchmark suite (ci profile)
        run: bun run bench --profile ci
        working-directory: ${{ env.BENCHMARKS_DIR }}

      - name: Cross-framework battle suite (ci profile)
        run: bun run battle --profile ci
        working-directory: ${{ env.BENCHMARKS_DIR }}
